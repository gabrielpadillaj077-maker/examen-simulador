<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador OCR Examen</title>
<script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
h1 {
    text-align: center;
    color: #667eea;
    margin-bottom: 30px;
}
.card {
    background: #f0f4ff;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}
.upload-area {
    border: 3px dashed #667eea;
    border-radius: 15px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}
.upload-area:hover { background: #e0e7ff; }
.upload-area input { display: none; }
.preview-img {
    max-width: 100%;
    max-height: 300px;
    margin: 15px 0;
    border-radius: 10px;
}
textarea {
    width: 100%;
    height: 150px;
    padding: 15px;
    border: 2px solid #667eea;
    border-radius: 10px;
    font-family: monospace;
    font-size: 13px;
    margin: 10px 0;
}
button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;
    margin-top: 10px;
}
button:hover { transform: scale(1.02); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.loading {
    text-align: center;
    padding: 20px;
    color: #667eea;
    font-size: 18px;
}
.question {
    background: #f8f9ff;
    padding: 25px;
    border-radius: 15px;
    margin: 20px 0;
    border-left: 5px solid #667eea;
}
.option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 12px 15px;
    margin: 8px 0;
    background: white;
    border: 2px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}
.option:hover { border-color: #667eea; }
.option.selected { border-color: #667eea; background: #667eea; color: white; }
.nav-btns { display: flex; gap: 10px; margin-top: 20px; }
.nav-btns button { width: 50%; }
.result {
    text-align: center;
    padding: 40px;
}
.score {
    font-size: 72px;
    font-weight: bold;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 20px 0;
}
.hidden { display: none; }
.timer {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #667eea;
    color: white;
    padding: 15px 25px;
    border-radius: 50px;
    font-size: 20px;
    font-weight: bold;
}
.progress {
    background: #ddd;
    height: 10px;
    border-radius: 5px;
    margin: 10px 0;
    overflow: hidden;
}
.progress-bar {
    background: #667eea;
    height: 100%;
    width: 0%;
    transition: width 0.3s;
}
</style>
</head>
<body>
<div class="container">
    <div id="setupScreen">
        <h1>📸 Simulador OCR + Examen</h1>

        <div class="card">
            <h3>1. Sube fotos de tus preguntas</h3>
            <p style="color: #666; margin: 10px 0; font-size: 14px;">
                Sube una o varias fotos de hojas con preguntas tipo test. El OCR extrae el texto automáticamente.
            </p>

            <label class="upload-area">
                <input type="file" id="fileInput" accept="image/*" multiple>
                📁 Click para subir fotos JPG/PNG
                <div id="fileList"></div>
            </label>

            <div id="loading" class="loading hidden">
                <div>🔍 Extrayendo texto con IA...</div>
                <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
                <div id="progressText">0%</div>
            </div>

            <textarea id="extractedText" placeholder="El texto extraído aparecerá aquí. Puedes editarlo antes de crear el examen..." class="hidden"></textarea>

            <button id="processBtn" onclick="procesarImagenes()" disabled>Procesar Imágenes con OCR</button>
            <button id="createBtn" onclick="crearExamen()" class="hidden">Crear Simulador de Examen</button>
        </div>
    </div>

    <div id="examScreen" class="hidden">
        <div id="questionContainer"></div>
        <div class="nav-btns">
            <button onclick="anterior()">◀ Anterior</button>
            <button onclick="siguiente()">Siguiente ▶</button>
        </div>
        <button onclick="terminarExamen()" style="background: #10B981; margin-top: 15px;">Terminar y Calificar</button>
        <button onclick="reiniciarIntento()" style="background: #F59E0B;">Repetir Examen 🔄</button>
    </div>

    <div id="resultScreen" class="hidden">
        <div class="result">
            <h1>Resultado Final</h1>
            <div class="score" id="scoreDisplay">0/0</div>
            <h2 id="scoreText"></h2>
            <div id="review"></div>
            <button onclick="reiniciarIntento()">Repetir mismo examen 🔄</button>
            <button onclick="nuevoExamen()">Cargar nuevas preguntas</button>
        </div>
    </div>
</div>

<div class="timer hidden" id="timer">30:00</div>

<script>
let questions = [];
let originalQuestions = []; // Guardamos copia para repetir
let currentQ = 0;
let answers = [];
let uploadedImages = [];
let timerInterval = null;
let timeLeft = 1800;

// Cargar múltiples imágenes
document.getElementById('fileInput').addEventListener('change', function(e) {
    uploadedImages = Array.from(e.target.files);
    document.getElementById('fileList').innerHTML =
        `<p style="margin-top: 10px; color: #10B981;">✅ ${uploadedImages.length} imagen(es) cargada(s)</p>`;
    document.getElementById('processBtn').disabled = false;
});

async function procesarImagenes() {
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('processBtn').disabled = true;

    let allText = '';

    for(let i = 0; i < uploadedImages.length; i++) {
        const file = uploadedImages[i];

        // Mostrar preview
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.className = 'preview-img';
        document.getElementById('fileList').appendChild(img);

        // OCR con Tesseract
        const { data: { text } = await Tesseract.recognize(file, 'spa+eng', {
            logger: m => {
                if(m.status === 'recognizing text') {
                    const progress = ((i + m.progress) / uploadedImages.length) * 100;
                    document.getElementById('progressBar').style.width = progress + '%';
                    document.getElementById('progressText').textContent = Math.round(progress) + '%';
                }
            }
        });

        allText += text + '\n---\n';
    }

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('extractedText').value = allText;
    document.getElementById('extractedText').classList.remove('hidden');
    document.getElementById('createBtn').classList.remove('hidden');
}

function parseQuestions(text) {
    const blocks = text.split('---').filter(b => b.trim());
    const parsed = [];

    blocks.forEach(block => {
        const lines = block.trim().split('\n').filter(l => l.trim());
        if(lines.length < 3) return;

        const question = lines[0].trim();
        const options = [];
        let correct = '';

        lines.forEach(line => {
            line = line.trim();
            if(/^[A-Da-d]\)/.test(line)) {
                options.push(line);
            }
            if(line.toUpperCase().includes('RESPUESTA') || line.toUpperCase().includes('ANSWER')) {
                correct = line.split(':')[1]?.trim().toUpperCase().charAt(0) || '';
            }
        });

        if(question && options.length > 0) {
            parsed.push({ question, options, correct });
        }
    });

    return parsed;
}

function crearExamen() {
    const text = document.getElementById('extractedText').value;
    questions = parseQuestions(text);

    if(questions.length === 0) {
        alert('No se detectaron preguntas. Edita el texto y asegúrate del formato: Pregunta + A) B) C) + RESPUESTA: X');
        return;
    }

    originalQuestions = JSON.parse(JSON.stringify(questions)); // Guardar copia
    iniciarIntento();
}

function iniciarIntento() {
    answers = new Array(questions.length).fill(null);
    currentQ = 0;

    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('examScreen').classList.remove('hidden');
    document.getElementById('resultScreen').classList.add('hidden');

    mostrarPregunta();
}

function reiniciarIntento() {
    questions = JSON.parse(JSON.stringify(originalQuestions)); // Resetear
    iniciarIntento();
}

function mostrarPregunta() {
    const q = questions[currentQ];
    let html = `<div class="question">
        <h3>Pregunta ${currentQ + 1} de ${questions.length}</h3>
        <p style="font-size: 18px; margin-bottom: 20px;">${q.question}</p>`;

    q.options.forEach((opt, i) => {
        const selected = answers[currentQ] === i? 'selected' : '';
        html += `<button class="option ${selected}" onclick="seleccionar(${i})">${opt}</button>`;
    });

    html += '</div>';
    document.getElementById('questionContainer').innerHTML = html;
}

function seleccionar(idx) {
    answers[currentQ] = idx;
    mostrarPregunta();
}

function anterior() {
    if(currentQ > 0) {
        currentQ--;
        mostrarPregunta();
    }
}

function siguiente() {
    if(currentQ < questions.length - 1) {
        currentQ++;
        mostrarPregunta();
    }
}

function terminarExamen() {
    if(timerInterval) clearInterval(timerInterval);

    let correctas = 0;
    questions.forEach((q, i) => {
        const userAns = answers[i];
        const correctIdx = q.options.findIndex(opt =>
            opt.toUpperCase().startsWith(q.correct + ')')
        );
        if(userAns === correctIdx) correctas++;
    });

    const porcentaje = Math.round((correctas / questions.length) * 100);

    document.getElementById('examScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');

    document.getElementById('scoreDisplay').textContent = `${correctas}/${questions.length}`;
    document.getElementById('scoreText').innerHTML =
        `Nota: ${porcentaje}% - ${porcentaje >= 70? 'Aprobado ✅' : 'Reprobado ❌'}`;

    // Revisión
    let reviewHtml = '<h3 style="margin-top: 30px;">Revisión:</h3>';
    questions.forEach((q, i) => {
        const userAns = answers[i];
        const correctIdx = q.options.findIndex(opt =>
            opt.toUpperCase().startsWith(q.correct + ')')
        );
        const esCorrecta = userAns === correctIdx;

        reviewHtml += `<div class="question">
            <strong>P${i+1}: ${q.question}</strong><br>
            <span style="color: ${esCorrecta? '#10B981' : '#EF4444'}">
                Tu respuesta: ${userAns!== null? q.options[userAns] : 'Sin responder'}
            </span><br>
            ${!esCorrecta? `<span style="color: #10B981">Correcta: ${q.options[correctIdx]}</span>` : ''}
        </div>`;
    });
    document.getElementById('review').innerHTML = reviewHtml;
}

function nuevoExamen() {
    location.reload();
}
</script>
</body>
</html>
